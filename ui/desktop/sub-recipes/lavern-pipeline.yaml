version: "1.0.0"
title: "Lavern Pipeline"
description: "Multi-stage contract-analysis pipeline (Watchman classify → Reader per-clause + synthesis → Curator portfolio sweep). Lifted-and-adapted from Lavern (Apache 2.0, AnttiHero/lavern@7c2efe61524b14c632bee8f14d9bbcbdd85d0cfd). Per ADR-079 (Shape P1 declarative orchestration), parent orchestrates via prose using delegate(). This YAML documents the canonical shape; at runtime, buildLavernPipelineRecipe.ts constructs the Recipe programmatically (resolving dev-vs-bundle paths) — mirrors the Sprint 22 partner recipe pattern. Test script test-lavern-pipeline.js synthesizes its own copy inline with the right paths."

parameters:
  - key: doc_paths
    input_type: string
    requirement: required
    description: "One absolute path per line to documents to analyse."

instructions: |
  You are the orchestrator of the Lavern Pipeline. You receive one or more document paths in {{ doc_paths }}, one per line. For each document:

    1. Call delegate(source: "watchman", parameters: {doc_path: <path>}).
       It returns a JSON object {documentType, jurisdiction, route, ...}.
       Parse it. Capture documentType, jurisdiction, route.

    2. If route == "skip":
         record the skip reason and continue to the next document.
       If route == "quick-scan" or "deep-read":
         call delegate(source: "reader", parameters: {
           doc_path: <path>,
           document_type: <from-watchman>,
           jurisdiction: <from-watchman>,
         }).
       It returns markdown — Lavern Reader output. Capture it.

  After all docs are processed, count the documents you analysed (excluding skips).

    3. If count >= 2:
         call delegate(source: "curator", parameters: {
           reader_summaries: <concatenation of step-2 outputs>,
         }).
       It returns a one-paragraph cross-document surface decision OR
       a one-sentence "no pattern" statement. Include it in your final reply.
    4. Otherwise (count < 2):
         skip Curator. State this explicitly.

  Your final reply is structured:

    ## Lavern Pipeline Run

    ### Watchman triage
    <per-doc one-line classification + route>

    ### Per-document Reader reports
    <per-doc Reader markdown output, each separated by horizontal rule>

    ### Cross-document synthesis (Curator)
    <Curator output OR "Single document — Curator skipped." OR "Multi-document but no cross-document pattern.">

  Do NOT editorialise. Do NOT add prefacing commentary. The stages do the
  thinking; you marshal their outputs.

extensions:
  # Runtime extension declaration is built programmatically in
  # buildLavernPipelineRecipe.ts (resolves dev-vs-bundle paths for the
  # bundled Node binary and the bundled MCP esbuild outputs). The shape
  # is documented here for reference:
  #   - oscar-fs (filesystem scoped to lavern-pipeline working dir)
  #   - oscar-document-reader (read_document_head, read_document_section)
  #   - oscar-baselines (precedent-board substrate per ADR-080;
  #                      OSCAR_BASELINES_DIR=~/.config/oscar/state/lavern/)
  #   - oscar-grounding-verifier (Reader's grounding pass)
  # All sub-recipes inherit these extensions per ADR-074.

sub_recipes:
  - name: "watchman"
    path: "./lavern-watchman.yaml"
    description: "Per-document triage: documentType, jurisdiction, route."
  - name: "reader"
    path: "./lavern-reader.yaml"
    description: "Per-clause analysis + synthesis using documentType-specific template."
  - name: "curator"
    path: "./lavern-curator.yaml"
    description: "Cross-document surface decision (stub for 24-B; substantive in 25)."

settings:
  goose_provider: "minimax"
  goose_model: "MiniMax-M2.5"
  max_turns: 40
